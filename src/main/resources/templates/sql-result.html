<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <title>Generated SQL</title>

</head>


<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-9">


                <div class="card">


                    <div class="card-header">
                        <h3>
                            Generated SQL
                        </h3>
                    </div>


                    <div class="card-body">


                        <label class="form-label">
                            SQL Query
                        </label>


                        <textarea class="form-control" style="height: 330px;" rows="8" readonly th:text="${sql}">
                    </textarea>


                        <br>


                        <button class="btn btn-primary px-5" onclick="copySql()">

                            Copy SQL

                        </button>


                        <a href="/" class="btn btn-secondary px-5">

                            Home

                        </a>

                    </div>


                </div>


            </div>

        </div>

    </div>


    <script>

        function copySql() {

            let sqlText = document.querySelector("textarea");

            sqlText.select();

            navigator.clipboard.writeText(sqlText.value);
          

        }

    </script>


</body>

</html>
