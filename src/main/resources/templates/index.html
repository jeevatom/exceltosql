<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Excel To SQL Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
    function funNext() {
        let form = document.getElementById("uploadForm");

        if($("#tableName").val().trim() == ""){
            $("#tableName").focus();
            return false;
        }

        let formData = new FormData(form);
        

        $("#nextBtn").html('<span class="spinner-grow spinner-grow-sm" aria-hidden="true"></span><span role="status"> Uploading...</span>');

        $.ajax({
            url: "/upload",
            type: "POST",
            data: formData,
            processData: false,
            contentType: false,
            success: function(response) {
                document.open();
                document.write(response);
                document.close();
            },
            error: function(xhr) {
               $("#alertMsg").html(xhr.getResponseHeader)
            }
        });
    }
</script>
</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card">

                <div class="card-header">
                    <h3>
                        <i class="bi bi-file-earmark-spreadsheet"></i>
                        Excel To SQL Generator
                    </h3>
                </div>

                <div class="card-body">

                    <form method="post" id="uploadForm"
                          enctype="multipart/form-data">

                        <!-- Table Name -->
                        <div class="row mb-4 align-items-center">

                            <label class="col-md-3 col-form-label">
                                Table Name
                                <span class="required">*</span>
                            </label>

                            <div class="col-md-9">
                                <input
                                    type="text"
                                    id="tableName"
                                    class="form-control"
                                    name="tableName"
                                    placeholder="eg : workplace.employee"
                                    required>
                            </div>

                        </div>

                        <!-- Database -->

                        <!-- <div class="row mb-4 align-items-center">

                            <label class="col-md-3 col-form-label">
                                Database
                            </label>

                             <div class="col-md-9">

                                <select class="form-select"
                                        name="database">

                                    <option>PostgreSQL</option>
                                    <option>MySQL</option>
                                    <option>SQL Server</option>
                                    <option>Oracle</option>

                                </select>

                            </div>  

                        </div> -->

                        <!-- Excel File -->

                        <div class="row mb-4 align-items-center">

                            <label class="col-md-3 col-form-label">
                                Excel File
                                <span class="required">*</span>
                            </label>

                            <div class="col-md-9">

                                <input
                                    type="file"
                                    class="form-control"
                                    name="file"
                                    accept=".xlsx,.xls"
                                    required>

                            </div>

                        </div>

                        <!-- Buttons -->

                        <div class="row">
                            <div class="offset-md-3 col-md-9">
                                <button onclick="funNext()" id="nextBtn"
                                    class="btn btn-primary px-5" type="button"> 
                                    <i class="bi bi-fast-forward"></i>
                                    Next
                                </button>

                                <button
                                    type="reset"
                                    class="btn btn-outline-secondary ms-2">
                                    Reset
                                </button>
                            </div>

                        </div>

                    </form>

                    <div th:if="${error}"
                         id="alertMsg"
                         class="alert alert-danger mt-4"
                         th:text="${error}">
                    </div>

                    <div class="footer-text">
                        Supported formats :
                        <strong>.xlsx</strong>,
                        <strong>.xls</strong>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
